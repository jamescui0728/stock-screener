name: CI

# 触发：push 到 main、对 main 提 PR
# 不在所有分支跑（节省 GitHub Actions 配额）
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # 也允许手动触发

# 取消同一分支的旧 run（push 多次时只跑最新）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1：后端 Python 编译 + import 检查 ──────────
  backend-syntax:
    name: Backend syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python files
        working-directory: backend
        run: |
          # 用 py_compile 检查全部 .py 语法
          find . -name '*.py' -not -path './.venv/*' -not -path './scripts/*' \
            | xargs python -m py_compile
          echo "✓ All backend Python files compile"

      - name: Import-test all top-level modules
        working-directory: backend
        run: |
          # 仅 import 一遍，确保 import 链能正确解析（不跑 init_db / 网络）
          python -c "
          import importlib, os, sys
          os.environ['DATABASE_URL'] = 'sqlite:///:memory:'
          modules = ['config', 'database', 'auth', 'main',
                     'api.routes', 'api.auth_routes',
                     'engines.signal_engine', 'engines.paper_trade',
                     'engines.company_scorer', 'engines.industry_scorer',
                     'data.fetcher', 'data.sentiment',
                     'backtest.engine', 'backtest.evaluator',
                     'models.models']
          failed = []
          for m in modules:
              try:
                  importlib.import_module(m)
                  print(f'  ✓ {m}')
              except Exception as e:
                  print(f'  ✗ {m}: {type(e).__name__}: {e}')
                  failed.append(m)
          sys.exit(1 if failed else 0)
          "

  # ─── Job 2：前端 build ─────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Show bundle size
        working-directory: frontend
        run: du -sh dist && du -h dist/* | sort -rh | head -10

  # ─── Job 3：Docker 镜像构建（不 push）──────────────
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: stock-screener-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: stock-screener-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate docker-compose
        run: docker compose config > /dev/null && echo "✓ docker-compose.yml valid"
