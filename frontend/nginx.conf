# 前端 nginx 配置（容器内）
# 1. 服务 Vue 静态资源（/usr/share/nginx/html）
# 2. 反代 /api/*、/readme、/project-docs/*、/docs、/openapi.json、/health 到后端
# 3. 单页应用 fallback：未命中静态文件 → /index.html（让 Vue Router 接管）

server {
    listen 80;
    server_name _;

    # gzip 压缩文本资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── 静态资源 + SPA fallback ──
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源加长缓存（构建时 Vite 已带 hash）
    location ~* \.(js|css|woff2?|ttf|svg|png|jpe?g|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA：未命中文件的请求都回 index.html，路由由 Vue Router 接管
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 后端 API 反代 ──
    # docker compose 网络内 backend 服务名解析为容器 IP
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # /paper/cache/warmup 后端 hard cap 14s，加上 buffer 60s 充分
        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # 回测 SSE 进度流（/api/backtest/progress）需要这两个
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── 后端文档 / OpenAPI Swagger UI ──
    location /readme {
        proxy_pass http://backend:8000/readme;
        proxy_set_header Host $host;
    }
    location /project-docs/ {
        proxy_pass http://backend:8000/project-docs/;
        proxy_set_header Host $host;
    }
    location = /docs {                # FastAPI 自动 Swagger UI
        proxy_pass http://backend:8000/docs;
    }
    location = /redoc {               # FastAPI 自动 ReDoc UI
        proxy_pass http://backend:8000/redoc;
    }
    location = /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
    location = /health {              # 用于外部健康检查
        proxy_pass http://backend:8000/health;
    }
}
